<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#002D72;stop-opacity:1" />
    </linearGradient>

    <!-- Grid pattern overlay -->
    <pattern id="gridPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Grid texture overlay -->
  <rect width="1200" height="630" fill="url(#gridPattern)"/>

  <!-- Logo circle -->
  <circle cx="600" cy="240" r="80" fill="#002D72" stroke="#F7931A" stroke-width="2"/>

  <!-- Bitcoin B symbol (scaled) -->
  <g transform="translate(600, 240)">
    <!-- Vertical stem -->
    <rect x="-6" y="-32" width="12" height="64" fill="#F7931A" rx="2"/>

    <!-- Top serif bar -->
    <rect x="-16" y="-36" width="32" height="8" fill="#F7931A" rx="2"/>

    <!-- Bottom serif bar -->
    <rect x="-16" y="28" width="32" height="8" fill="#F7931A" rx="2"/>

    <!-- Top right bump -->
    <path d="M 6 -20 Q 16 -20 16 -10 Q 16 0 6 0 Z" fill="#F7931A"/>

    <!-- Bottom right bump -->
    <path d="M 6 0 Q 16 0 16 10 Q 16 20 6 20 Z" fill="#F7931A"/>
  </g>

  <!-- Main heading -->
  <text x="600" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" text-anchor="middle">Rhode Island Bitcoin Policy Initiative</text>

  <!-- Domain -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="rgba(255,255,255,0.8)" text-anchor="middle">ribpi.com</text>
</svg>