<svg viewBox="0 0 320 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Logo icon -->
  <g transform="translate(0, 0)">
    <!-- Circle background -->
    <circle cx="32" cy="32" r="32" fill="#002D72"/>

    <!-- Bitcoin B symbol -->
    <g transform="translate(32, 32)">
      <!-- Vertical stem -->
      <rect x="-3" y="-16" width="6" height="32" fill="#F7931A" rx="1"/>

      <!-- Top serif bar -->
      <rect x="-8" y="-18" width="16" height="4" fill="#F7931A" rx="1"/>

      <!-- Bottom serif bar -->
      <rect x="-8" y="14" width="16" height="4" fill="#F7931A" rx="1"/>

      <!-- Top right bump -->
      <path d="M 3 -10 Q 8 -10 8 -5 Q 8 0 3 0 Z" fill="#F7931A"/>

      <!-- Bottom right bump -->
      <path d="M 3 0 Q 8 0 8 5 Q 8 10 3 10 Z" fill="#F7931A"/>
    </g>
  </g>

  <!-- Main text "RIBPI" -->
  <text x="72" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">RIBPI</text>

  <!-- Tagline text -->
  <text x="72" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="rgba(255,255,255,0.7)">Rhode Island Bitcoin Policy Initiative</text>
</svg>