<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle background -->
  <circle cx="16" cy="16" r="16" fill="#002D72"/>

  <!-- Bitcoin B symbol -->
  <g transform="translate(16, 16)">
    <!-- Vertical stem -->
    <rect x="-1.5" y="-8" width="3" height="16" fill="#F7931A" rx="0.5"/>

    <!-- Top serif bar -->
    <rect x="-4" y="-9" width="8" height="2" fill="#F7931A" rx="0.5"/>

    <!-- Bottom serif bar -->
    <rect x="-4" y="7" width="8" height="2" fill="#F7931A" rx="0.5"/>

    <!-- Top right bump -->
